<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Регистрация | Pulse</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0b1120;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#3b82f6;
    border-radius:50%;
    filter:blur(180px);
    top:-150px;
    left:-150px;
    opacity:.35;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#8b5cf6;
    border-radius:50%;
    filter:blur(180px);
    bottom:-150px;
    right:-150px;
    opacity:.35;
}

.card{
    position:relative;
    z-index:2;
    width:430px;
    background:rgba(17,24,39,.85);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:40px;
    box-shadow:
        0 20px 60px rgba(0,0,0,.5),
        0 0 30px rgba(0,229,255,.15);
}

.logo{
    text-align:center;
    font-size:72px;
    color:#00e5ff;
    margin-bottom:10px;

    text-shadow:
        0 0 10px #00e5ff,
        0 0 25px #00e5ff,
        0 0 50px #00e5ff;

    animation:pulse 2s infinite;
}

.title{
    color:white;
    text-align:center;
    font-size:34px;
    font-weight:700;
    margin-bottom:30px;
}

.input{
    width:100%;
    background:#1e293b;
    border:1px solid #24314f;
    border-radius:14px;
    padding:16px;
    color:white;
    font-size:16px;
    margin-bottom:14px;
}

.input:focus{
    outline:none;
    border:1px solid #00e5ff;
    box-shadow:0 0 20px rgba(0,229,255,.3);
}

.button{
    width:100%;
    border:none;
    border-radius:14px;
    padding:16px;
    background:linear-gradient(
        90deg,
        #5b7fff,
        #00e5ff
    );
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.2s;
}

.button:hover{
    transform:translateY(-2px);
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#94a3b8;
}

.footer a{
    color:#60a5fa;
    text-decoration:none;
}

@keyframes pulse{

    0%{
        transform:scale(1);
        opacity:1;
    }

    50%{
        transform:scale(1.15);
        opacity:.8;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }

}

</style>

</head>
<body>

<div class="card">

```
<div class="logo">◉</div>

<div class="title">
    Pulse
</div>

<form method="POST">

    <input
    class="input"
    type="text"
    name="username"
    placeholder="Придумайте логин"
    required>

    <input
    class="input"
    type="password"
    name="password"
    placeholder="Придумайте пароль"
    required>

    <button class="button" type="submit">
        Создать аккаунт
    </button>

</form>

<div class="footer">
    Уже есть аккаунт?
    <a href="/login">Войти</a>
</div>
```

</div>

</body>
</html>
