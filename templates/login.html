<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вход | Pulse</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0b1120;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#3b82f6;
    border-radius:50%;
    filter:blur(180px);
    top:-150px;
    left:-150px;
    opacity:.35;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#8b5cf6;
    border-radius:50%;
    filter:blur(180px);
    bottom:-150px;
    right:-150px;
    opacity:.35;
}

.card{
    position:relative;
    z-index:2;
    width:430px;
    background:rgba(17,24,39,.85);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:40px;
    box-shadow:
        0 20px 60px rgba(0,0,0,.5),
        0 0 30px rgba(88,101,242,.15);
}

.logo{
    text-align:center;
    font-size:64px;
    margin-bottom:10px;
}

.title{
    color:white;
    text-align:center;
    font-size:32px;
    font-weight:700;
}

.subtitle{
    color:#94a3b8;
    text-align:center;
    margin-top:8px;
    margin-bottom:30px;
}

.input{
    width:100%;
    background:#1e293b;
    border:none;
    border-radius:14px;
    padding:16px;
    color:white;
    font-size:16px;
    margin-bottom:14px;
}

.input:focus{
    outline:none;
}

.button{
    width:100%;
    border:none;
    border-radius:14px;
    padding:16px;
    background:#5865f2;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.2s;
}

.button:hover{
    background:#4752c4;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#94a3b8;
}

.footer a{
    color:#60a5fa;
    text-decoration:none;
}

</style>

</head>
<body>

<div class="card">

```
<div class="logo">💬</div>

<div class="title">
    Pulse
</div>

<div class="subtitle">
    Общайся без ограничений
</div>

<form method="POST">

    <input
    class="input"
    type="text"
    name="username"
    placeholder="Логин"
    required>

    <input
    class="input"
    type="password"
    name="password"
    placeholder="Пароль"
    required>

    <button class="button" type="submit">
        Войти
    </button>

</form>

<div class="footer">
    Нет аккаунта?
    <a href="/register">Создать аккаунт</a>
</div>
```

</div>

</body>
</html>
