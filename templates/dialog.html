<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pulse Chat</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0b1120;
    color:white;
}

.header{
    position:sticky;
    top:0;
    background:#111827;
    padding:20px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
    font-size:34px;
    font-weight:800;
    letter-spacing:3px;

    background:linear-gradient(
        90deg,
        #00e5ff,
        #5b7fff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    margin-top:8px;
    color:#94a3b8;
    font-size:14px;
}

.username{
    margin-top:8px;
    color:#94a3b8;
}

.messages{
    padding:20px;
    padding-bottom:100px;
    display:flex;
    flex-direction:column;
}

.my-message{
    align-self:flex-end;
    max-width:70%;
    background:#2563eb;
    padding:12px 16px;
    border-radius:18px 18px 4px 18px;
    margin-bottom:10px;
    color:white;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.other-message{
    align-self:flex-start;
    max-width:70%;
    background:#1e293b;
    padding:12px 16px;
    border-radius:18px 18px 18px 4px;
    margin-bottom:10px;
    color:white;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.author{
    font-size:13px;
    font-weight:bold;
    color:#93c5fd;
    margin-bottom:4px;
}

.time{
    font-size:11px;
    color:#cbd5e1;
    text-align:right;
    margin-top:6px;
}

.form{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111827;
    padding:15px;
    display:flex;
    gap:10px;
}

.form input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
}

.form input:focus{
    outline:none;
}

.form button{
    border:none;
    padding:15px 22px;
    border-radius:12px;
    color:white;
    cursor:pointer;

    background:linear-gradient(
        135deg,
        #5b7fff,
        #00e5ff
    );
}

.back{
    position:fixed;
    left:20px;
    top:20px;
    color:#60a5fa;
    text-decoration:none;
    z-index:999;
}

</style>

</head>

<body>

<a class="back" href="/users">
← Назад
</a>

<div class="header">

<div class="logo">
🔥 ПРОВЕРКА
</div>

<div class="subtitle">
Connect Instantly
</div>

<div class="username">
Диалог с {{ username }}
</div>

</div>

<div class="messages" id="messages">

{% for sender, text, created_at in messages %}

{% if sender == session["username"] %}

<div class="my-message">

<div class="author">
Вы
</div>

<div>
{{ text }}
</div>

<div class="time">
{{ created_at }}
</div>

</div>

{% else %}

<div class="other-message">

<div class="author">
{{ sender }}
</div>

<div>
{{ text }}
</div>

<div class="time">
{{ created_at }}
</div>

</div>

{% endif %}

{% endfor %}

</div>

<form class="form" method="POST">

<input
type="text"
name="message"
placeholder="Напишите сообщение..."
autocomplete="off"
required>

<button type="submit">
➤
</button>

</form>

<script>

function loadMessages() {

fetch("/dialog_messages/{{ username }}")
.then(response => response.text())
.then(data => {
document.getElementById("messages").innerHTML = data;
});

}

setInterval(loadMessages, 2000);

</script>

</body>
</html>
