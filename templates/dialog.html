<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pulse Chat</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0b1120;
    color:white;
}

.header{
    position:sticky;
    top:0;
    background:#111827;
    padding:20px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
    font-size:30px;
    font-weight:bold;
}

.logo span{
    color:#00e5ff;

    text-shadow:
        0 0 10px #00e5ff,
        0 0 20px #00e5ff,
        0 0 40px #00e5ff;
}

.username{
    margin-top:8px;
    color:#94a3b8;
}

.messages{
    max-width:1000px;
    margin:auto;
    padding:25px;
    padding-bottom:120px;
}

.my-message{
    max-width:70%;
    margin-left:auto;
    margin-bottom:15px;

    padding:14px;

    border-radius:18px;

    background:linear-gradient(
        135deg,
        #5b7fff,
        #00e5ff
    );
}

.other-message{
    max-width:70%;
    margin-right:auto;
    margin-bottom:15px;

    padding:14px;

    border-radius:18px;

    background:#131c31;
}

.author{
    font-weight:bold;
    margin-bottom:5px;
}

.time{
    margin-top:5px;
    font-size:12px;
    opacity:.7;
}

.form{
    position:fixed;
    bottom:0;
    left:0;

    width:100%;

    background:#111827;

    padding:15px;

    display:flex;
    gap:10px;
}

.form input{

    flex:1;

    padding:15px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;
}

.form input:focus{
    outline:none;
}

.form button{

    border:none;

    padding:15px 22px;

    border-radius:12px;

    color:white;

    cursor:pointer;

    background:linear-gradient(
        135deg,
        #5b7fff,
        #00e5ff
    );
}

.back{

    position:fixed;

    left:20px;
    top:20px;

    color:#60a5fa;

    text-decoration:none;
}

</style>

</head>

<body>

<a class="back" href="/users">
← Назад
</a>

<div class="header">

```
<div class="logo">
    <span>◉</span> Pulse
</div>

<div class="username">
    Диалог с {{ username }}
</div>
```

</div>

<div class="messages" id="messages">

{% for sender, text, created_at in messages %}

```
{% if sender == session["username"] %}

    <div class="my-message">

        <div class="author">
            Вы
        </div>

        <div>
            {{ text }}
        </div>

        <div class="time">
            {{ created_at }}
        </div>

    </div>

{% else %}

    <div class="other-message">

        <div class="author">
            {{ sender }}
        </div>

        <div>
            {{ text }}
        </div>

        <div class="time">
            {{ created_at }}
        </div>

    </div>

{% endif %}
```

{% endfor %}

</div>

<form class="form" method="POST">

```
<input
    type="text"
    name="message"
    placeholder="Напишите сообщение..."
    autocomplete="off"
    required
>

<button type="submit">
    ➤
</button>
```

</form>

<script>

function loadMessages() {

    fetch("/dialog_messages/{{ username }}")
        .then(response => response.text())
        .then(data => {
            document.getElementById("messages").innerHTML = data;
        });

}

setInterval(loadMessages, 2000);

</script>

</body>
</html>
