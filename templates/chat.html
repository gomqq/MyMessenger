<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Chat</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0b1120;
    color:white;
    height:100vh;
    overflow:hidden;
}

.wrapper{
    display:flex;
    height:100vh;
}

.sidebar{
    width:280px;
    background:#111827;
    border-right:1px solid rgba(255,255,255,.05);
    display:flex;
    flex-direction:column;
}

.logo{
    padding:25px;
    font-size:28px;
    font-weight:800;
    text-align:center;
    letter-spacing:2px;

    background:linear-gradient(
        90deg,
        #00e5ff,
        #5b7fff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.user-info{
    padding:15px 20px;
    border-top:1px solid rgba(255,255,255,.05);
    border-bottom:1px solid rgba(255,255,255,.05);
}

.users{
    flex:1;
    overflow-y:auto;
}

.user{
    display:flex;
    align-items:center;
    gap:12px;
    padding:15px 20px;
    text-decoration:none;
    color:white;
}

.user:hover{
    background:#182338;
}

.avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;

    background:linear-gradient(
        135deg,
        #5b7fff,
        #00e5ff
    );
}

.logout{
    margin:15px;
    padding:12px;
    text-align:center;
    text-decoration:none;
    color:white;
    border-radius:12px;
    background:#ef4444;
}

.chat-area{
    flex:1;
    display:flex;
    flex-direction:column;
}

.chat-header{
    background:#111827;
    padding:20px;
    border-bottom:1px solid rgba(255,255,255,.05);
    font-size:20px;
    font-weight:600;
    position:relative;
    z-index:1;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:25px;
}

.message{
    background:#182338;
    padding:14px;
    border-radius:16px;
    margin-bottom:12px;
}

.author{
    color:#00e5ff;
    font-weight:bold;
    margin-bottom:5px;
}

.form{
    display:flex;
    gap:10px;
    padding:20px;
    background:#111827;
}

.form input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
}

.form button{
    border:none;
    padding:15px 25px;
    border-radius:12px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

.mobile-menu{
    display:none;
    pointer-events:auto;
}

/* МОБИЛЬНАЯ ВЕРСИЯ */

@media (max-width:768px){

    .sidebar{
        display:none;
    }

    .mobile-menu{
        display:block;
        position:fixed;
        top:15px;
        left:15px;
        z-index:999999;
        background:#111827;
        color:white;
        text-decoration:none;
        padding:12px 16px;
        border-radius:12px;
        pointer-events:auto;
        box-shadow:0 0 20px rgba(0,0,0,.4);
    }

    .chat-header{
        padding-top:70px;
        text-align:center;
    }

    .messages{
        padding:12px;
        padding-bottom:90px;
    }

    .message{
        font-size:14px;
    }

    .form{
        position:fixed;
        bottom:0;
        left:0;
        width:100%;
        padding:10px;
    }

    .form input{
        font-size:16px;
    }

    .form button{
        padding:15px;
    }

}

</style>

</head>
<body>

<a href="/pulse" class="mobile-menu">
☰ Меню
</a>

<div class="wrapper">

<div class="sidebar">

<div class="logo">
⚡ PULSE
</div>

<div class="user-info">
Вы вошли как <b>{{ username }}</b>
</div>

<div class="users">

{% for user in users %}

{% if user[0] != username %}

<a class="user" href="/dialog/{{ user[0] }}">

<div class="avatar">
{{ user[0][0].upper() }}
</div>

<div>
{{ user[0] }}
</div>

</a>

{% endif %}

{% endfor %}

</div>

<a class="logout" href="/logout">
Выйти
</a>

</div>

<div class="chat-area">

<div class="chat-header">
💬 Общий чат
</div>

<div class="messages" id="messages">

{% for username, text, created_at in messages %}

<div class="message">

<div class="author">
{{ username }} • {{ created_at }}
</div>

<div>
{{ text }}
</div>

</div>

{% endfor %}

</div>

<form class="form" method="POST">

<input
type="text"
name="message"
placeholder="Введите сообщение..."
autocomplete="off"
required>

<button type="submit">
Отправить
</button>

</form>

</div>

</div>

<script>

function loadMessages() {

fetch("/messages")
.then(response => response.text())
.then(data => {

document.getElementById("messages").innerHTML = data;

});

}

setInterval(loadMessages, 2000);

</script>

</body>
</html>
