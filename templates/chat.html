{% extends "base.html" %}

{% block title %}
Общий чат
{% endblock %}

{% block head %}

<style>

.chat-area{
    display:flex;
    flex-direction:column;
    height:100vh;
}

.chat-header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    border-bottom:1px solid rgba(255,255,255,.05);
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    max-width:70%;
    padding:14px;
    border-radius:16px;
    margin-bottom:12px;
    word-break:break-word;
}

.message.left{
    background:#182338;
    margin-right:auto;
}

.message.right{
    background:#2563eb;
    margin-left:auto;
}

.author{
    font-size:13px;
    margin-bottom:5px;
    opacity:.8;
}

.voice-btn{
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:#ef4444 !important;
    color:white;
    font-size:22px;
    cursor:pointer;
}

.form{
    display:flex;
    gap:10px;
    padding:15px;
    background:#111827;
}

.form input{
    flex:1;
    padding:16px 20px;
    border:none;
    border-radius:30px;
    background:#1e293b;
    color:white;
    font-size:16px;
    outline:none;
}

.form button{
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:linear-gradient(
        135deg,
        #00e5ff,
        #5b7fff
    );
    color:white;
    font-size:22px;
    cursor:pointer;
}

@media (max-width:768px){

    .chat-header{
    background:#111827;
    padding:12px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    border-bottom:1px solid rgba(255,255,255,.05);
}

    .messages{
        padding:10px;
        padding-bottom:100px;
    }

    .form{
        position:fixed;
        bottom:0;
        left:0;
        width:100%;
        padding:10px;
        z-index:100;
    }

}

</style>

{% endblock %}

{% block content %}

<div class="chat-area">

    <div class="chat-header">
        💬 Общий чат
    </div>

    <div class="messages" id="messages">

        {% for username, text, created_at in messages %}

        <div class="message {% if username == session['username'] %}right{% else %}left{% endif %}">

            <div class="author">
                {{ username }} • {{ created_at }}
            </div>

            <div>
                {{ text }}
            </div>

        </div>

        {% endfor %}

    </div>

    <form class="form" method="POST">

<input
    type="file"
    id="imageInput"
    accept="image/*"
    hidden
>

<button
    type="button"
    id="imageBtn"
    class="voice-btn"
>
    📸
</button>

    <button
        type="button"
        id="recordBtn"
        class="voice-btn"
    >
        🎤
    </button>

    <input
        type="text"
        name="message"
        placeholder="💬 Написать сообщение..."
        autocomplete="off"
        required
    >

    <button type="submit">
        ➤
    </button>

</form>

</div>

<script>

function loadMessages(){

    fetch("/messages")
    .then(response => response.text())
    .then(data => {
        document.getElementById("messages").innerHTML = data;
    });

}

setInterval(loadMessages, 2000);

let mediaRecorder;
let chunks = [];

const recordBtn = document.getElementById("recordBtn");

recordBtn.addEventListener("click", async () => {

    if (!mediaRecorder || mediaRecorder.state === "inactive") {

        const stream = await navigator.mediaDevices.getUserMedia({
            audio:true
        });

        mediaRecorder = new MediaRecorder(stream);

        chunks = [];

        mediaRecorder.ondataavailable = e => {
            chunks.push(e.data);
        };

        mediaRecorder.onstop = () => {

    const blob = new Blob(chunks,{
        type:"audio/webm"
    });

    const formData = new FormData();

    formData.append(
        "voice",
        blob,
        "voice.webm"
    );

    fetch("/upload_voice",{
        method:"POST",
        body:formData
    })
    .then(response => response.text())
    .then(data => {

        console.log(data);

        loadMessages();

    });

};

        mediaRecorder.start();

        recordBtn.innerHTML = "⏹";

    } else {

        mediaRecorder.stop();

        recordBtn.innerHTML = "🎤";

    }

});

const imageBtn = document.getElementById("imageBtn");
const imageInput = document.getElementById("imageInput");

imageBtn.addEventListener("click", () => {
    imageInput.click();
});

imageInput.addEventListener("change", () => {

    const file = imageInput.files[0];

    if (!file) return;

    const formData = new FormData();

    formData.append(
        "image",
        file
    );

    fetch("/upload_image",{
        method:"POST",
        body:formData
    })
    .then(response => response.text())
    .then(data => {

        console.log(data);

        loadMessages();

    });

});

</script>

{% endblock %}
