<!DOCTYPE html>
<html>
<head>
    <title>MyMessenger</title>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
        }

        .header {
            background: #1e293b;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            margin: 0;
        }

        .logout {
            background: #ef4444;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 8px;
        }

        .chat {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .message {
            background: #1e293b;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        .author {
            color: #38bdf8;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .text {
            color: white;
        }

        .form {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1e293b;
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        .form input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .form button {
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .messages {
            margin-bottom: 100px;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>💬 MyMessenger</h2>

    <div>
        Пользователь: <b>{{ username }}</b>
        <a class="logout" href="/logout">Выйти</a>
    </div>
</div>

<div class="chat">

    <div class="messages">

        {% for username, text, created_at in messages %}

        <div class="message">

            <div class="author">
                {{ username }} • {{ created_at }}
            </div>

            <div class="text">
                {{ text }}
            </div>

        </div>

        {% endfor %}

    </div>

</div>

<form class="form" method="POST">

    <input
        type="text"
        name="message"
        placeholder="Напишите сообщение..."
        autocomplete="off"
        required
    >

    <button type="submit">
        Отправить
    </button>

</form>
<script>
setInterval(function() {
    location.reload();
}, 3000);
</script>
</body>
</html>
