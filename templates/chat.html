{% extends "base.html" %}

{% block title %}
Общий чат
{% endblock %}

{% block head %}

<style>

.chat-area{
    display:flex;
    flex-direction:column;
    height:100vh;
}

.chat-header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    border-bottom:1px solid rgba(255,255,255,.05);
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    background:#182338;
    padding:14px;
    border-radius:16px;
    margin-bottom:12px;
    word-break:break-word;
}

.author{
    color:#00e5ff;
    font-weight:bold;
    margin-bottom:5px;
}

.form{
    display:flex;
    gap:10px;
    padding:15px;
    background:#111827;
}

.form input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
}

.form button{
    border:none;
    padding:15px 25px;
    border-radius:12px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

@media (max-width:768px){

    .chat-header{
    background:#111827;
    padding:12px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    border-bottom:1px solid rgba(255,255,255,.05);
}

    .messages{
        padding:10px;
        padding-bottom:100px;
    }

    .form{
        position:fixed;
        bottom:0;
        left:0;
        width:100%;
        padding:10px;
        z-index:100;
    }

}

</style>

{% endblock %}

{% block content %}

<div class="chat-area">

    <div class="chat-header">
        💬 Общий чат
    </div>

    <div class="messages" id="messages">

        {% for username, text, created_at in messages %}

        <div class="message">

            <div class="author">
                {{ username }} • {{ created_at }}
            </div>

            <div>
                {{ text }}
            </div>

        </div>

        {% endfor %}

    </div>

    <form class="form" method="POST">

        <input
            type="text"
            name="message"
            placeholder="Введите сообщение..."
            autocomplete="off"
            required
        >

        <button type="submit">
            Отправить
        </button>

    </form>

</div>

<script>

function loadMessages(){

    fetch("/messages")
    .then(response => response.text())
    .then(data => {
        document.getElementById("messages").innerHTML = data;
    });

}

setInterval(loadMessages, 2000);

</script>

{% endblock %}
