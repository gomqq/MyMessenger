<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>{% block title %}Pulse{% endblock %}</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0b1120;
    color:white;
}

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:240px;
    height:100vh;
    background:#111827;
    border-right:1px solid rgba(255,255,255,.05);
    z-index:1000;
}

.logo{
    padding:25px;
    text-align:center;
    font-size:30px;
    font-weight:800;
    letter-spacing:2px;

    background:linear-gradient(
        90deg,
        #00e5ff,
        #5b7fff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.profile-box{
    margin:15px;
    padding:15px;
    border-radius:14px;
    background:#0f172a;
}

.profile-name{
    font-weight:bold;
    margin-bottom:6px;
}

.profile-status{
    color:#22c55e;
    font-size:14px;
}

.sidebar a{
    display:block;
    padding:15px 20px;
    color:white;
    text-decoration:none;
    transition:.2s;
}

.sidebar a:hover{
    background:#1e293b;
}

.content{
    margin-left:240px;
    min-height:100vh;
}

.menu-btn{
    display:block;
    position:fixed;
    top:15px;
    left:15px;
    z-index:1100;
    background:#111827;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
}

/* МОБИЛЬНАЯ ВЕРСИЯ */

@media (max-width:768px){

    .sidebar{
        left:-240px;
        transition:.3s;
    }

    .sidebar.active{
        left:0;
    }

    .content{
        margin-left:0;
    }

    .menu-btn{
        display:block;
        position:fixed;
        top:15px;
        left:15px;
        z-index:1100;
        background:#111827;
        color:white;
        border:none;
        padding:10px 14px;
        border-radius:10px;
        font-size:20px;
        cursor:pointer;
    }

    .logo{
        font-size:24px;
        padding:20px;
    }

    .profile-box{
        margin:10px;
    }

}

</style>

{% block head %}{% endblock %}

</head>
<body>

<button class="menu-btn" onclick="toggleMenu()">
☰
</button>

<div class="sidebar" id="sidebar">

    <div class="logo">
        ⚡ PULSE
    </div>

    <div class="profile-box">

        <div class="profile-name">
            👤 {{ session.get("username", "Гость") }}
        </div>

        <div class="profile-status">
            🟢 Онлайн
        </div>

    </div>

    <a href="/chat">💬 Общий чат</a>
    <a href="/users">👥 Пользователи</a>
    <a href="/pulse">⚡ Pulse</a>
    <a href="/profile">👤 Профиль</a>
    <a href="/login">🔑 Вход</a>
    <a href="/register">📝 Регистрация</a>
    <a href="/logout">🚪 Выход</a>

</div>

<div class="content">

{% block content %}
{% endblock %}

</div>

<script>

function toggleMenu(){
    document
        .getElementById("sidebar")
        .classList.toggle("active");
}

</script>

</body>
</html>
