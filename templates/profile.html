<div style="
    background:#111827;
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:500px;
    text-align:center;
">

    <h1 style="margin-bottom:20px;">
        👤 Профиль
    </h1>

    <img
    src="{{ url_for('static', filename='avatars/' + avatar) }}"
    style="
        width:120px;
        height:120px;
        border-radius:50%;
        object-fit:cover;
        border:3px solid #00e5ff;
        margin-bottom:20px;
    ">

    <h2 style="margin-bottom:15px;">
        {{ username }}
    </h2>

    <p style="margin-bottom:10px;">
        🟢 Онлайн
    </p>

    <p style="margin-bottom:25px;">
        Pulse Messenger
    </p>

    <form method="POST" enctype="multipart/form-data">

        <input
        type="file"
        name="avatar"
        style="
            margin-bottom:20px;
            color:white;
        ">

        <br>

        <button
        type="submit"
        style="
            background:linear-gradient(
                90deg,
                #5b7fff,
                #00e5ff
            );
            border:none;
            padding:12px 25px;
            border-radius:12px;
            color:white;
            cursor:pointer;
            font-size:15px;
        ">
            📷 Загрузить аватар
        </button>

    </form>

</div>
